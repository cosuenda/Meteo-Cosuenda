<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meteo Cosuenda</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Estación Meteorológica Cosuenda</h1>

    <!-- Icono principal -->
    <div class="weather-card">
      <img id="weather-icon" src="" alt="Clima">
      <p>Clima: <span id="weather-text">--</span></p>
    </div>

    <!-- Temperatura -->
    <div class="weather-card">
      <img src="https://img.icons8.com/color/48/000000/temperature.png" alt="Temperatura">
      <p>Temperatura: <span id="temp">--</span></p>
      <p>Máx: <span id="tempMax">--</span> | Mín: <span id="tempMin">--</span></p>
    </div>

    <!-- Humedad -->
    <div class="weather-card">
      <img src="https://img.icons8.com/color/48/000000/humidity.png" alt="Humedad">
      <p>Humedad: <span id="hum">--</span></p>
      <p>Máx: <span id="humMax">--</span> | Mín: <span id="humMin">--</span></p>
    </div>

    <!-- Lluvia -->
    <div class="weather-card">
      <img src="https://img.icons8.com/color/48/000000/rain.png" alt="Lluvia">
      <p>Lluvia diaria: <span id="rain">--</span></p>
      <p>Máx: <span id="rainMax">--</span> | Mín: <span id="rainMin">--</span></p>
    </div>

    <!-- Viento -->
    <div class="weather-card">
      <img src="https://img.icons8.com/color/48/000000/wind.png" alt="Viento">
      <p>Viento: <span id="wind">--</span></p>
      <p>Dirección: <span id="winddir">--</span></p>
    </div>

    <!-- Presión -->
    <div class="weather-card">
      <img src="https://img.icons8.com/color/48/000000/barometer.png" alt="Presión">
      <p>Presión: <span id="press">--</span></p>
    </div>

    <!-- Solar y UV -->
    <div class="weather-card">
      <img src="https://img.icons8.com/color/48/000000/sun.png" alt="Solar">
      <p>Radiación solar: <span id="solar">--</span></p>
      <p>Índice UV: <span id="uvi">--</span></p>
    </div>

    <!-- Última actualización -->
    <p class="update">Última actualización: <span id="update">--</span></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
