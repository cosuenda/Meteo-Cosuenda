<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #87CEEB, #f0f8ff);
    transition: background 1s ease;
}

header {
    text-align: center;
    padding: 20px;
    color: white;
    background: linear-gradient(90deg, #004e92, #000428);
}

header h1 {
    margin: 0;
    font-size: 28px;
}

header p {
    margin: 5px 0 0;
    font-size: 14px;
    opacity: 0.8;
}

.container {
    max-width: 1100px;
    margin: 30px auto;
    padding: 10px;
}

.panel-wrapper {
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    overflow: hidden;
}

iframe {
    width: 100%;
    height: 850px;
    border: none;
}

footer {
    text-align: center;
    padding: 20px;
    font-size: 14px;
    color: #444;
}
@media(max-width:768px){
    iframe{
        height: 700px;
    }
}
</style>
</head>

<body>

<header>
    <h1>🌤️ Meteo Cosuenda</h1>
    <p>Estación Meteorológica en Tiempo Real</p>
</header>

<div class="container">
    <div class="panel-wrapper">
        <iframe src="https://www.ecowitt.net/home/share?authorize=JYE6X4"></iframe>
    </div>
</div>

<footer>
    Datos proporcionados por estación Ecowitt · Actualización automática
</footer>

<script>
// Fondo dinámico día/noche
const hour = new Date().getHours();
if (hour < 6 || hour >= 18) {
    document.body.style.background = "linear-gradient(to bottom, #001848, #0a1f44)";
}
</script>

</body>
</html>
