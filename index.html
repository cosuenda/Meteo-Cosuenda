<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda</title>

<style>
body {
    margin: 0;
    font-family: Segoe UI, sans-serif;
    background: linear-gradient(to bottom, #87CEEB, #f0f8ff);
    text-align: center;
    transition: background 1s ease;
}
header {
    background: linear-gradient(90deg, #004e92, #000428);
    color: white;
    padding: 20px;
}
header h1 {margin: 0;}
.large-temp {
    font-size: 70px;
    font-weight: bold;
    margin: 25px 0 10px;
}
.icon-temp {
    font-size: 48px;
    margin-bottom: 15px;
}
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
    gap: 15px;
    max-width: 960px;
    margin: auto;
    padding: 0 10px 30px;
}
.card {
    background: white;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}
.card h2 {font-size: 16px; margin: 0;}
.card p {font-size: 22px; font-weight: bold; margin-top: 6px;}
footer {padding: 20px; font-size: 14px; color: #444;}
</style>

</head>
<body>

<header>
    <h1>🌤️ Meteo Cosuenda</h1>
</header>

<div class="large-temp" id="tempBig">-- °C</div>
<div class="icon-temp" id="tempIcon">🌤️</div>

<div class="cards">
    <div class="card">
        <h2>💧 Humedad</h2>
        <p id="hum">-- %</p>
    </div>
    <div class="card">
        <h2>💨 Viento</h2>
        <p id="wind">-- km/h</p>
    </div>
    <div class="card">
        <h2>🌧️ Lluvia</h2>
        <p id="rain">-- mm</p>
    </div>
    <div class="card">
        <h2>📈 Presión</h2>
        <p id="press">-- hPa</p>
    </div>
</div>

<footer>Actualización automática cada 5 minutos</footer>

<script>
// ---- API + conversiones ----
const appKey = "26C4D6AD21CF8F8C4F3BA85E1CAF6701";
const apiKey = "adf65434-1ace-43dd-b9a9-27915843d243";
const mac = "84:CC:A8:B4:B1:F6";
const url = `https://api.ecowitt.net/api/v3/device/real_time?application_key=${appKey}&api_key=${apiKey}&mac=${mac}&call_back=all`;

function toC(f){ return ((f-32)*5/9).toFixed(1); }
function toKmh(mph){ return (mph*1.60934).toFixed(1); }
function toMm(inch){ return (inch*25.4).toFixed(1); }
function toHpa(inHg){ return (inHg*33.8639).toFixed(1); }

async function obtenerDatos(){
    try {
        const res = await fetch(url);
        const data = await res.json();
        if(data.code !== 0) return;

        const o = data.data.outdoor;
        const w = data.data.wind;
        const r = data.data.rainfall;
        const p = data.data.barometer;

        // temperatura
        const tempValF = o?.temperature?.value;
        const tempValC = tempValF !== undefined ? parseFloat(toC(tempValF)) : "--";
        document.getElementById("tempBig").textContent = tempValC + " °C";

        // icono y color
        const iconEl = document.getElementById("tempIcon");
        const tempEl = document.getElementById("tempBig");
        if(tempValC !== "--"){
            if(tempValC <= 0){ iconEl.textContent="❄️"; tempEl.style.color="#00f"; }
            else if(tempValC <= 15){ iconEl.textContent="🌤️"; tempEl.style.color="#0aa"; }
            else if(tempValC <= 30){ iconEl.textContent="☀️"; tempEl.style.color="#fa0"; }
            else{ iconEl.textContent="🔥"; tempEl.style.color="#f00"; }
        }

        // otros datos
        if(o?.humidity?.value !== undefined)
            document.getElementById("hum").textContent = o.humidity.value + " %";
        if(w?.wind_speed?.value !== undefined)
            document.getElementById("wind").textContent = toKmh(w.wind_speed.value) + " km/h";
        if(r?.daily?.value !== undefined)
            document.getElementById("rain").textContent = toMm(r.daily.value) + " mm";
        if(p?.relative?.value !== undefined)
            document.getElementById("press").textContent = toHpa(p.relative.value) + " hPa";

    } catch(e) {
        console.error("Error:", e);
    }
}

obtenerDatos();
setInterval(obtenerDatos, 300000);
</script>

</body>
</html>
