<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f4f6f9;
}

h1{
    margin-top:20px;
}

.panel{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
    margin-top:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    width:250px;
}

.valor{
    font-size:40px;
    font-weight:bold;
    margin:10px 0;
}

.minmax{
    font-size:14px;
    margin-top:5px;
}

.min{
    color:green;
}

.max{
    color:red;
}
</style>
</head>

<body>

<h1>🌤 Meteo Cosuenda</h1>

<div class="panel">

    <div class="card">
        <h2>Temperatura</h2>
        <div id="tempValor" class="valor">-- °C</div>
        <canvas id="tempGauge"></canvas>
        <div id="tempMinMax" class="minmax"></div>
    </div>

    <div class="card">
        <h2>Presión</h2>
        <div id="pressValor" class="valor">-- hPa</div>
        <canvas id="pressGauge"></canvas>
        <div id="pressMinMax" class="minmax"></div>
    </div>

    <div class="card">
        <h2>Viento</h2>
        <div id="windValor" class="valor">-- km/h</div>
        <canvas id="windGauge"></canvas>
        <div id="windMinMax" class="minmax"></div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
