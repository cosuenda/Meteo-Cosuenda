<div class="weather-panel">
  <h2>Meteo-Cosuenda (Tiempo Real)</h2>
  
  <div class="weather-row">
    <div class="weather-item">
      <img src="https://img.icons8.com/color/48/000000/temperature.png" alt="Temperatura">
      <p>Temperatura: <span id="temp">--</span></p>
    </div>
    <div class="weather-item">
      <img src="https://img.icons8.com/color/48/000000/thermometer.png" alt="Sensación térmica">
      <p>Sensación: <span id="feels">--</span></p>
    </div>
    <div class="weather-item">
      <img src="https://img.icons8.com/color/48/000000/dew.png" alt="Punto de rocío">
      <p>Punto de rocío: <span id="dew">--</span></p>
    </div>
  </div>
  
  <div class="weather-row">
    <div class="weather-item">
      <img src="https://img.icons8.com/color/48/000000/humidity.png" alt="Humedad">
      <p>Humedad: <span id="hum">--</span></p>
    </div>
    <div class="weather-item">
      <img src="https://img.icons8.com/color/48/000000/wind.png" alt="Viento">
      <p>Viento: <span id="wind">--</span></p>
      <p>Dirección: <span id="winddir">--</span></p>
    </div>
    <div class="weather-item">
      <img src="https://img.icons8.com/color/48/000000/pressure.png" alt="Presión">
      <p>Presión: <span id="press">--</span></p>
    </div>
  </div>
  
  <div class="weather-row">
    <div class="weather-item">
      <img src="https://img.icons8.com/color/48/000000/sun.png" alt="Radiación solar">
      <p>Solar: <span id="solar">--</span></p>
    </div>
    <div class="weather-item">
      <img src="https://img.icons8.com/color/48/000000/sun-uv-index.png" alt="Índice UV">
      <p>UV: <span id="uvi">--</span></p>
    </div>
    <div class="weather-item">
      <img src="https://img.icons8.com/color/48/000000/rain.png" alt="Precipitación diaria">
      <p>Lluvia: <span id="rain">--</span></p>
    </div>
  </div>

  <p class="update">Última actualización: <span id="update">--</span></p>
</div>

<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
