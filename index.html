<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    transition:background 1s ease;
    text-align:center;
}
header{
    background:linear-gradient(90deg,#004e92,#000428);
    color:white;
    padding:25px 10px;
}
header h1{margin:0; font-size:28px;}
header p{margin:5px 0 0; font-size:14px; opacity:0.8;}

#tempBig{
    font-size:80px;
    font-weight:bold;
    margin:20px 0 10px;
}
#tempIcon{
    font-size:50px;
    margin-bottom:25px;
    transition: transform 0.5s ease;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    max-width:1000px;
    margin:auto;
    padding:0 10px 30px;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    transition: transform 0.3s ease;
}
.card:hover{
    transform:translateY(-5px);
}
.card h2{margin:0; font-size:16px;}
.card p{font-size:22px; font-weight:700; margin-top:8px;}

footer{
    padding:20px;
    font-size:14px;
    color:#444;
}
</style>
</head>

<body>

<header>
<h1>🌤️ Meteo Cosuenda</h1>
<p>Estación Meteorológica · Datos en Tiempo Real</p>
</header>

<div id="tempBig">-- °C</div>
<div id="tempIcon">🌤️</div>

<div class="cards">
    <div class="card">
        <h2>💧 Humedad</h2>
        <p id="hum">-- %</p>
    </div>
    <div class="card">
        <h2>💨 Viento</h2>
        <p id="wind">-- km/h</p>
    </div>
    <div class="card">
        <h2>🌧️ Lluvia</h2>
        <p id="rain">-- mm</p>
    </div>
    <div class="card">
        <h2>📈 Presión</h2>
        <p id="press">-- hPa</p>
    </div>
</div>

<footer>Actualización automática cada 5 minutos</footer>

<script>
// ===== API =====
const appKey = "26C4D6AD21CF8F8C4F3BA85E1CAF6701";
const apiKey = "adf65434-1ace-43dd-b9a9-27915843d243";
const mac = "84:CC:A8:B4:B1:F6";
const url = `https://api.ecowitt.net/api/v3/device/real_time?application_key=${appKey}&api_key=${apiKey}&mac=${mac}&call_back=all`;

// ===== Conversiones =====
function toC(f){return ((f-32)*5/9).toFixed(1);}
function toKmh(mph){return (mph*1.60934).toFixed(1);}
function toMm(inch){return (inch*25.4).toFixed(1);}
function toHpa(inHg){return (inHg*33.8639).toFixed(1);}

// ===== Obtener y mostrar datos =====
async function obtenerDatos(){
    try{
        const res = await fetch(url);
        const data = await res.json();
        if(data.code!==0) return;

        const o=data.data.outdoor;
        const w=data.data.wind;
        const r=data.data.rainfall;
        const p=data.data.barometer;

        // Temperatura grande
        const tempValF = o?.temperature?.value;
        const tempC = tempValF!==undefined?parseFloat(toC(tempValF)):"--";
        const tempEl = document.getElementById("tempBig");
        const iconEl = document.getElementById("tempIcon");
        tempEl.textContent = tempC + " °C";

        // Iconos y colores dinámicos
        if(tempC!=="--"){
            if(tempC<=0){iconEl.textContent="❄️"; tempEl.style.color="#00f";}
            else if(tempC<=15){iconEl.textContent="🌤️"; tempEl.style.color="#0aa";}
            else if(tempC<=30){iconEl.textContent="☀️"; tempEl.style.color="#fa0";}
            else{iconEl.textContent="🔥"; tempEl.style.color="#f00";}
        }

        // Otros datos
        if(o?.humidity?.value!==undefined) document.getElementById("hum").textContent=o.humidity.value+" %";
        if(w?.wind_speed?.value!==undefined) document.getElementById("wind").textContent=toKmh(w.wind_speed.value)+" km/h";
        if(r?.daily?.value!==undefined) document.getElementById("rain").textContent=toMm(r.daily.value)+" mm";
        if(p?.relative?.value!==undefined) document.getElementById("press").textContent=toHpa(p.relative.value)+" hPa";

    }catch(e){console.error("Error:",e);}
}

// Carga inicial + actualización cada 5 min
obtenerDatos();
setInterval(obtenerDatos,300000);

// ===== Fondo dinámico día/noche =====
const hour=new Date().getHours();
document.body.style.background = (hour<6 || hour>=18) ? "linear-gradient(to bottom,#001848,#0a1f44)" : "linear-gradient(to bottom,#87CEEB,#f0f8ff)";
</script>

</body>
</html>
