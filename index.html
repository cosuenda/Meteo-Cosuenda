<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🌤️ Meteo Cosuenda</h1>
<p>Estación Meteorológica Profesional</p>
</header>

<div class="container">

<div class="card">
<h2>Temperatura</h2>
<div id="tempBig" class="bigTemp">-- °C</div>
<div id="tempMin">Min diaria: --</div>
<div id="tempMax">Max diaria: --</div>
</div>

<div class="card">
<h2>Humedad</h2>
<div id="hum">-- %</div>
</div>

<div class="card">
<h2>Viento</h2>
<div id="wind">-- km/h</div>
<div id="windDirText">Dirección: --</div>

<div class="rosa" id="rosa">
    <div id="flechaViento" class="flecha"></div>
</div>
</div>

<div class="card">
<h2>Lluvia</h2>
<div id="rain">-- mm</div>
</div>

<div class="card">
<h2>Presión</h2>
<div id="press">-- hPa</div>
</div>

<div class="card">
<h2>Índice UV</h2>
<div id="uv">--</div>
</div>

<div class="card">
<h2>Radiación Solar</h2>
<div id="solar">-- W/m²</div>
</div>

<div class="card">
<canvas id="tempChart"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
