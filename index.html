<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    text-align:center;
    transition:background 1s;
}

/* Estilos generales */
header{
    background:#003366;
    color:white;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.card{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.bigTemp{
    font-size:60px;
    font-weight:bold;
    color:#222;
}

/* Rosa de los vientos */
.rosa{
    position:relative;
    width:200px;
    height:200px;
    border:3px solid #333;
    border-radius:50%;
    margin:auto;
}

.marca{
    position:absolute;
    width:2px;
    height:10px;
    background:#333;
    left:50%;
    top:0;
    transform-origin:bottom center;
}

.cardinal{
    position:absolute;
    font-size:13px;
    font-weight:bold;
}

.flecha{
    position:absolute;
    width:6px;
    height:80px;
    background:blue;
    top:20px;
    left:50%;
    transform-origin:bottom center;
    transform:translateX(-50%) rotate(0deg);
    border-radius:3px;
    transition:transform 1s ease;
}
</style>
</head>

<body>

<header>
<h1>🌤️ Meteo Cosuenda</h1>
<p>Estación Meteorológica Profesional</p>
</header>

<div class="container">

<div class="card">
<h2>Temperatura</h2>
<div id="tempBig" class="bigTemp">-- °C</div>
<div id="tempMin">Min diaria: --</div>
<div id="tempMax">Max diaria: --</div>
</div>

<div class="card">
<h2>Humedad</h2>
<div id="hum">-- %</div>
</div>

<div class="card">
<h2>Viento</h2>
<div id="wind">-- km/h</div>
<div id="windDirText">Dirección: --</div>

<div class="rosa" id="rosa">
    <div id="flechaViento" class="flecha"></div>
</div>
</div>

<div class="card">
<h2>Lluvia</h2>
<div id="rain">-- mm</div>
</div>

<div class="card">
<h2>Presión</h2>
<div id="press">-- hPa</div>
</div>

<div class="card">
<h2>Índice UV</h2>
<div id="uv">--</div>
</div>

<div class="card">
<h2>Radiación Solar</h2>
<div id="solar">-- W/m²</div>
</div>

<div class="card">
<canvas id="tempChart"></canvas>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
