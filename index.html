<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo-Cosuenda</title>

<link rel="icon" href="images/favicon.ico">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  text-align:center;
  margin:0;
  padding:20px;
  transition: background 1s;
}

.weather-container{
  max-width:900px;
  margin:auto;
}

.big-temp{
  font-size:60px;
  font-weight:bold;
}

.card{
  background:white;
  padding:15px;
  margin:10px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

/* Rosa viento */
.rosa{
  position:relative;
  width:200px;
  height:200px;
  border:2px solid #333;
  border-radius:50%;
  margin:20px auto;
}

.flecha{
  position:absolute;
  top:10px;
  left:50%;
  width:6px;
  height:80px;
  background:blue;
  transform-origin:bottom center;
  transform:translateX(-50%) rotate(0deg);
  border-radius:3px;
}

/* Gauge */
.gauge{
  width:120px;
  height:60px;
  border:10px solid #ddd;
  border-top-left-radius:120px;
  border-top-right-radius:120px;
  border-bottom:none;
  position:relative;
  margin:auto;
  overflow:hidden;
}

.gauge-fill{
  width:100%;
  height:100%;
  background:green;
  position:absolute;
  top:100%;
  left:0;
  transform-origin:center top;
  transform:rotate(0deg);
}
</style>
</head>

<body>

<div class="weather-container">

<h1>🌤 Meteo-Cosuenda</h1>

<div class="big-temp" id="tempBig">-- °C</div>

<div class="grid">

<div class="card">
<p>Humedad</p>
<div class="gauge">
<div class="gauge-fill" id="humGauge"></div>
</div>
<p id="hum">-- %</p>
</div>

<div class="card">
<p>Viento</p>
<p id="wind">-- km/h</p>
<p id="windDirText">Dirección: --</p>
</div>

<div class="card">
<p>Lluvia</p>
<p id="rain">-- mm</p>
</div>

<div class="card">
<p>Presión</p>
<p id="press">-- hPa</p>
</div>

<div class="card">
<p>UV</p>
<div class="gauge">
<div class="gauge-fill" id="uvGauge"></div>
</div>
</div>

</div>

<!-- Rosa viento -->
<div class="rosa">
<div class="flecha" id="flechaViento"></div>
</div>

<!-- Extremos -->
<div class="card">
<p id="tempMin"></p>
<p id="humMax"></p>
<p id="windMax"></p>
<p id="tempRecordMax"></p>
<p id="tempRecordMin"></p>
<p id="rainMonth"></p>
<p id="rainYear"></p>
</div>

<!-- Gráfico -->
<div class="card">
<canvas id="tempChart"></canvas>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
