<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    transition: background 1s;
}

header{
    background:#003366;
    color:white;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin:15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.valor{
    font-size:40px;
    font-weight:bold;
}

.minmax{
    font-size:16px;
    color:#555;
}

footer{
    padding:20px;
    font-size:14px;
    color:#333;
}
</style>
</head>

<body>

<header>
<h1>🌤️ Meteo Cosuenda</h1>
<p>Estación Meteorológica en Tiempo Real</p>
</header>

<div class="container">

    <!-- TEMPERATURA -->
    <div class="card">
        <h2>Temperatura</h2>
        <div id="tempBig" class="valor">-- °C</div>
        <div id="tempMin" class="minmax">Min: -- °C</div>
        <div id="tempMax" class="minmax">Max: -- °C</div>
    </div>

    <!-- HUMEDAD -->
    <div class="card">
        <h2>Humedad</h2>
        <div id="hum" class="valor">-- %</div>
        <div id="humMax" class="minmax">Max: -- %</div>
    </div>

    <!-- VIENTO -->
    <div class="card">
        <h2>Viento</h2>
        <div id="wind" class="valor">-- km/h</div>
        <div id="windDir" class="minmax">Dirección: --</div>
        <div id="windMax" class="minmax">Max: -- km/h</div>
    </div>

    <!-- LLUVIA -->
    <div class="card">
        <h2>Lluvia diaria</h2>
        <div id="rain" class="valor">-- mm</div>
    </div>

    <!-- PRESIÓN -->
    <div class="card">
        <h2>Presión</h2>
        <div id="press" class="valor">-- hPa</div>
    </div>

</div>

<footer>
Actualización automática cada 5 minutos · Datos estación Cosuenda
</footer>

<script src="script.js"></script>

</body>
</html>
