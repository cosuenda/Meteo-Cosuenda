<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda - Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
body{margin:0;font-family:'Poppins',sans-serif;text-align:center;transition:background 1s;}
header{background:linear-gradient(90deg,#004e92,#000428);color:white;padding:25px 10px;}
header h1{margin:0;font-size:28px;} 
header p{margin:5px 0 0;font-size:14px;opacity:0.8;}
#tempBig{font-size:70px;font-weight:bold;margin:20px 0 10px;transition: color 0.5s;}
#tempIcon{font-size:50px;margin-bottom:20px;transition: transform 0.5s ease;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;max-width:1000px;margin:auto;padding:0 10px 30px;}
.card{background:white;border-radius:20px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,0.15);position:relative;}
.card h2{margin:0;font-size:18px;} 
.card p.value{font-size:28px;font-weight:700;margin-top:8px;}
.card p.minmax{font-size:12px;color:#555;margin:5px 0;}
.bar-container{width:100%;height:8px;background:#eee;border-radius:5px;margin-top:5px;overflow:hidden;}
.bar-fill{height:100%;background:#0a0;width:0%;transition:width 0.5s;}
#charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;max-width:1000px;margin:20px auto;padding:0 10px;}
#map{height:300px;margin:20px 10px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,0.15);}
</style>
</head>
<body>

<header>
<h1>🌤️ Meteo Cosuenda</h1>
<p>Lecturas en Tiempo Real · Min/Max del Día · Gráficas y Mapa</p>
</header>

<div id="tempBig">-- °C</div>
<div id="tempIcon">🌤️</div>
<p class="minmax" id="tempMinMax"></p>
<div class="bar-container"><div id="tempBar" class="bar-fill"></div></div>

<div class="cards">
  <div class="card">
    <h2>Humedad</h2>
    <p class="value" id="hum">-- %</p>
    <p class="minmax" id="humMinMax"></p>
    <div class="bar-container"><div id="humBar" class="bar-fill"></div></div>
  </div>
  <div class="card">
    <h2>Viento</h2>
    <p class="value" id="wind">-- km/h</p>
    <p class="minmax" id="windMinMax"></p>
    <div class="bar-container"><div id="windBar" class="bar-fill"></div></div>
  </div>
  <div class="card">
    <h2>Lluvia</h2>
    <p class="value" id="rain">-- mm</p>
    <p class="minmax" id="rainMinMax"></p>
    <div class="bar-container"><div id="rainBar" class="bar-fill"></div></div>
  </div>
  <div class="card">
    <h2>Presión</h2>
    <p class="value" id="press">-- hPa</p>
    <p class="minmax" id="pressMinMax"></p>
    <div class="bar-container"><div id="pressBar" class="bar-fill"></div></div>
  </div>
</div>

<div id="charts">
  <canvas id="tempChart"></canvas>
  <canvas id="rainChart"></canvas>
  <canvas id="humChart"></canvas>
  <canvas id="windChart"></canvas>
</div>

<div id="map"></div>

<script src="script.js"></script>
</body>
</html>
