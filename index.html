<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda</title>
<link rel="icon" href="data:,">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:'Segoe UI', Arial, sans-serif;
    text-align:center;
    transition: background 1.5s ease;
}

header{
    background:linear-gradient(90deg,#0D3B66,#144f91);
    color:white;
    padding:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    transition:transform 0.3s, box-shadow 0.3s;
}
.card:hover{
    transform:translateY(-6px);
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.valor{
    font-size:40px;
    font-weight:bold;
    transition:all 0.5s ease;
}

.minmax{
    font-size:14px;
    color:#555;
    margin-top:5px;
}

/* Rosa viento */
.rosa{
    width:200px;
    height:200px;
    margin:20px auto;
    border-radius:50%;
    border:2px solid #0D3B66;
    position:relative;
    background:radial-gradient(circle,#e0f7fa 70%,transparent);
}

.flecha{
    width:8px;
    height:90px;
    position:absolute;
    top:10%;
    left:50%;
    transform-origin:50% 80px;
    transform:translateX(-50%) rotate(0deg);
    border-radius:4px;
}

/* Gauges */
.gauge{
    width:150px;
    margin:auto;
}

footer{
    padding:20px;
    grid-column:1/-1;
}

.oculto{display:none;}

@media(max-width:500px){
    .rosa{width:150px;height:150px;}
    .flecha{height:70px;transform-origin:50% 60px;}
}
</style>
</head>

<body>

<header>
<h1>🌤️ Meteo Cosuenda</h1>
<p>Estación Meteorológica Profesional</p>
</header>

<div class="container">

<div class="card">
<h2>🌡 Temperatura</h2>
<div id="tempBig" class="valor">-- °C</div>
<div id="tempMin" class="minmax">Min diaria: --</div>
<div id="tempRecordMax" class="minmax">🏆 Récord Máx: --</div>
<canvas id="tempChart"></canvas>
</div>

<div class="card">
<h2>💧 Humedad</h2>
<div id="hum" class="valor">-- %</div>
<canvas id="humGauge" class="gauge"></canvas>
</div>

<div class="card">
<h2>🌬 Viento</h2>
<div id="wind" class="valor">-- km/h</div>
<div id="windDirText" class="minmax">Dirección: --</div>
<div class="rosa">
<div id="flecha" class="flecha"></div>
</div>
</div>

<div class="card">
<h2>☀ Índice UV</h2>
<div id="uv" class="valor">--</div>
<canvas id="uvGauge" class="gauge"></canvas>
</div>

<div class="card">
<h2>🌞 Radiación Solar</h2>
<div id="solar" class="valor">-- W/m²</div>
</div>

</div>

<footer>
Actualización automática cada 5 minutos · Meteo Cosuenda
</footer>

<script src="script.js"></script>
</body>
</html>
