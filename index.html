<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  text-align:center;
  background:linear-gradient(to bottom,#87CEEB,#f0f8ff);
}

header{
  background:linear-gradient(90deg,#004e92,#000428);
  color:white;
  padding:25px 10px;
}

#tempBig{
  font-size:80px;
  font-weight:bold;
  margin:20px 0 5px;
}

.minmax{
  font-size:14px;
  margin-bottom:20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  max-width:1000px;
  margin:auto;
  padding:0 10px 30px;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.card h2{margin:0;font-size:18px;}
.card p{font-size:28px;font-weight:700;margin-top:8px;}

small{
  display:block;
  margin-top:6px;
  font-size:13px;
  color:#666;
}
</style>
</head>

<body>

<header>
<h1>🌤️ Meteo Cosuenda</h1>
<p>Tiempo real · Cosuenda (Zaragoza)</p>
</header>

<div id="tempBig">-- °C</div>

<div class="minmax">
⬇️ Min: <span id="tempMin">-- °C</span> |
⬆️ Max: <span id="tempMax">-- °C</span>
</div>

<div class="cards">

  <div class="card">
    <h2>💧 Humedad</h2>
    <p id="hum">-- %</p>
    <small>Máx: <span id="humMax">-- %</span></small>
  </div>

  <div class="card">
    <h2>💨 Viento</h2>
    <p id="wind">-- km/h</p>
    <small>Racha máx: <span id="windMax">-- km/h</span></small>
  </div>

  <div class="card">
    <h2>🌧️ Lluvia</h2>
    <p id="rain">-- mm</p>
  </div>

  <div class="card">
    <h2>📈 Presión</h2>
    <p id="press">-- hPa</p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
