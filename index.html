<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body class="day">

<header>
<h1>🌤️ Meteo Cosuenda</h1>
<p>Estación Meteorológica Profesional</p>
</header>

<div class="container">

<div class="card">
<h2>Temperatura</h2>
<div id="tempBig" class="bigTemp">--</div>
<div id="tempMin">Min diaria: --</div>
<div id="tempMax">Max diaria: --</div>
<div id="sensacion">Sensación térmica: --</div>
</div>

<div class="card">
<h2>Humedad</h2>
<div id="hum" class="bigHum">-- %</div>
</div>

<div class="card">
<h2>Viento</h2>
<div id="wind">-- km/h</div>
<div id="windMax">Racha máx: -- km/h</div>
<div id="windDirText">Dirección: --</div>
<div class="rosa" id="rosa">
<div id="flechaViento" class="flecha"></div>
</div>
</div>

<div class="card">
<h2>Lluvia</h2>
<div id="rain">-- mm</div>
<div id="rainMonth">-- mm</div>
</div>

<div class="card">
<h2>Presión</h2>
<div id="press">-- hPa</div>
</div>

<div class="card">
<h2>Índice UV</h2>
<div id="uv">--</div>
</div>

<div class="card">
<h2>Radiación Solar</h2>
<div id="solar">--</div>
</div>

<div class="card">
<canvas id="tempChart"></canvas>
</div>

</div>

<div id="ultimaActualizacion" style="text-align:center;margin:10px 0;font-size:14px;">
Última actualización: --
</div>

<script src="script.js"></script>
</body>
</html>
