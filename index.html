<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    transition: background 1s;
}

header{
    background:#003366;
    color:white;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin:15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.valor{
    font-size:40px;
    font-weight:bold;
}

/* ===== ROSA DE LOS VIENTOS ===== */

.rosa-container{
    position:relative;
    width:220px;
    height:220px;
    margin:20px auto;
}

.rosa{
    width:220px;
    height:220px;
    border:4px solid #333;
    border-radius:50%;
    position:relative;
}

.cardinal{
    position:absolute;
    font-weight:bold;
    font-size:16px;
}

.n  { top:-5px; left:50%; transform:translateX(-50%); }
.s  { bottom:-5px; left:50%; transform:translateX(-50%); }
.e  { right:-5px; top:50%; transform:translateY(-50%); }
.w  { left:-5px; top:50%; transform:translateY(-50%); }

.ne { top:20px; right:20px; }
.se { bottom:20px; right:20px; }
.sw { bottom:20px; left:20px; }
.nw { top:20px; left:20px; }

.flecha{
    position:absolute;
    width:4px;
    height:90px;
    background:red;
    top:50%;
    left:50%;
    transform-origin:50% 100%;
    transform:translate(-50%,-100%) rotate(0deg);
    transition: transform 0.5s ease;
}

footer{
    padding:20px;
    font-size:14px;
}
</style>
</head>

<body>

<header>
<h1>🌤️ Meteo Cosuenda</h1>
<p>Rosa de los Vientos Profesional</p>
</header>

<div class="container">

<div class="card">
<h2>Viento</h2>
<div id="windSpeed" class="valor">-- km/h</div>
<div id="windDirText">Dirección: --</div>

<div class="rosa-container">

<div class="rosa">

<div class="cardinal n">N</div>
<div class="cardinal ne">NE</div>
<div class="cardinal e">E</div>
<div class="cardinal se">SE</div>
<div class="cardinal s">S</div>
<div class="cardinal sw">SW</div>
<div class="cardinal w">W</div>
<div class="cardinal nw">NW</div>

<div id="flecha" class="flecha"></div>

</div>

</div>

</div>

</div>

<footer>
Actualización automática cada 5 minutos · Cosuenda
</footer>

<script src="script.js"></script>

</body>
</html>
