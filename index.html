<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🌦 Meteo Cosuenda</h1>
    <p id="update">Última actualización: --</p>
  </header>

  <main>
    <section class="grid">
      <div class="card">
        <img src="icons/temperature.png" alt="Temperatura">
        <h2>Temperatura</h2>
        <p><span id="temp">--</span></p>
      </div>
      <div class="card">
        <img src="icons/humidity.png" alt="Humedad">
        <h2>Humedad</h2>
        <p><span id="hum">--</span></p>
      </div>
      <div class="card">
        <img src="icons/wind.png" alt="Viento">
        <h2>Viento</h2>
        <p><span id="wind">--</span></p>
      </div>
      <div class="card">
        <img src="icons/rain.png" alt="Lluvia">
        <h2>Lluvia</h2>
        <p><span id="rain">--</span> mm</p>
      </div>
      <div class="card">
        <img src="icons/pressure.png" alt="Presión">
        <h2>Presión</h2>
        <p><span id="press">--</span></p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
