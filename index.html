<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:'Poppins',sans-serif;text-align:center;transition:background 1s;}
header{background:linear-gradient(90deg,#004e92,#000428);color:white;padding:25px 10px;}
#tempBig{font-size:80px;font-weight:bold;margin:20px 0 5px;}
#minmax{font-size:18px;margin-bottom:20px;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;max-width:1000px;margin:auto;padding:20px;}
.card{background:white;border-radius:20px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,0.15);}
#map{height:300px;margin:20px;border-radius:20px;}
</style>
</head>

<body>

<header>
<h1>🌤️ Meteo Cosuenda</h1>
<p>Tiempo Real · Estación meteorológica</p>
</header>

<div id="tempBig">-- °C</div>
<div id="minmax">
Mín: <span id="tempMin">--</span> °C |
Máx: <span id="tempMax">--</span> °C
</div>

<div class="cards">
  <div class="card"><h2>💧 Humedad</h2><p id="hum">-- %</p></div>
  <div class="card"><h2>💨 Viento</h2><p id="wind">-- km/h</p></div>
  <div class="card"><h2>🧭 Dirección</h2><p id="windDir">--</p></div>
  <div class="card"><h2>🌧️ Lluvia diaria</h2><p id="rain">-- mm</p></div>
  <div class="card"><h2>📈 Presión</h2><p id="press">-- hPa</p></div>
</div>

<div id="map"></div>

<script src="script.js"></script>
</body>
</html>
