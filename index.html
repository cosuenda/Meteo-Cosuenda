<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meteo-Cosuenda - Iconos Bonitos</title>
  <style>
    body {
      background: #1e1e2f;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    .weather-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      margin-top: 40px;
    }
    .weather-box {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    canvas {
      width: 128px;
      height: 128px;
    }
    .temp {
      margin-top: 10px;
      font-size: 24px;
    }
  </style>
</head>
<body>
  <h1>Meteo-Cosuenda</h1>
  <p>Clima en tiempo real con iconos animados</p>

  <div class="weather-container">
    <div class="weather-box">
      <canvas id="sunny"></canvas>
      <div class="temp">25°C</div>
      <div>Despejado</div>
    </div>
    <div class="weather-box">
      <canvas id="partlyCloudy"></canvas>
      <div class="temp">18°C</div>
      <div>Parcialmente nublado</div>
    </div>
    <div class="weather-box">
      <canvas id="rain"></canvas>
      <div class="temp">12°C</div>
      <div>Lluvia</div>
    </div>
    <div class="weather-box">
      <canvas id="snow"></canvas>
      <div class="temp">0°C</div>
      <div>Nieve</div>
    </div>
  </div>

  <!-- Skycons -->
  <script src="https://cdn.jsdelivr.net/npm/skycons@1.0.0/skycons.js"></script>
  <script>
    const skycons = new Skycons({ "color": "white" });

    // Asignamos iconos
    skycons.add("sunny", Skycons.CLEAR_DAY);
    skycons.add("partlyCloudy", Skycons.PARTLY_CLOUDY_DAY);
    skycons.add("rain", Skycons.RAIN);
    skycons.add("snow", Skycons.SNOW);

    // Activamos animación
    skycons.play();
  </script>
</body>
</html>
