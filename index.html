<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/skycons/1396634940/skycons.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f4f6f9;
    transition: background 1s;
}

h1{
    margin-top:20px;
}

.panel{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
    margin-top:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    width:250px;
}

.valor{
    font-size:40px;
    font-weight:bold;
    margin:10px 0;
}

.minmax{
    font-size:14px;
    margin-top:5px;
}

.min{
    color:green;
}

.max{
    color:red;
}
</style>
</head>

<body>

<h1>🌤 Meteo Cosuenda</h1>

<div class="panel">

    <div class="card">
        <h2>🌡 Temperatura</h2>
        <canvas id="iconTemp" width="64" height="64"></canvas>
        <div id="tempValor" class="valor">-- °C</div>
        <div id="tempMinMax" class="minmax"></div>
    </div>

    <div class="card">
        <h2>🌬 Viento</h2>
        <canvas id="iconWind" width="64" height="64"></canvas>
        <div id="windValor" class="valor">-- km/h</div>
        <div id="windMinMax" class="minmax"></div>
    </div>

    <div class="card">
        <h2>📈 Presión</h2>
        <div id="pressValor" class="valor">-- hPa</div>
        <div id="pressMinMax" class="minmax"></div>
    </div>

    <div class="card">
        <h2>💧 Humedad</h2>
        <div id="humValor" class="valor">-- %</div>
        <div id="humMinMax" class="minmax"></div>
    </div>

    <div class="card">
        <h2>🌧 Lluvia diaria</h2>
        <div id="rainValor" class="valor">-- mm</div>
        <div id="rainMinMax" class="minmax"></div>
    </div>

    <div class="card">
        <h2>🌞 Radiación Solar</h2>
        <div id="solarValor" class="valor">-- W/m²</div>
    </div>

    <div class="card">
        <h2>🔆 Índice UV</h2>
        <div id="uviValor" class="valor">--</div>
    </div>

</div>

<h2>📊 Histórico 24h</h2>

<div class="panel">

  <div class="card">
    <h3>Temperatura</h3>
    <canvas id="chartTemp"></canvas>
  </div>

  <div class="card">
    <h3>Presión</h3>
    <canvas id="chartPress"></canvas>
  </div>

  <div class="card">
    <h3>Viento</h3>
    <canvas id="chartWind"></canvas>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
