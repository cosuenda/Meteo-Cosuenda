<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align:center;
    transition: background 1s;
    color:white;
}

header{
    padding:25px;
    font-size:22px;
    font-weight:bold;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* TEMPERATURA NEÓN */
.bigTemp{
    font-size:80px;
    font-weight:800;
    letter-spacing:2px;
    transition: all 0.5s ease;
}

/* Frío */
.frio{
    color:#00eaff;
    text-shadow:
      0 0 5px rgba(0,234,255,0.9),
      0 0 15px rgba(0,234,255,0.6),
      0 0 30px rgba(0,234,255,0.4);
}

/* Templado */
.templado{
    color:#ffae00;
    text-shadow:
      0 0 5px rgba(255,174,0,0.8),
      0 0 15px rgba(255,174,0,0.5),
      0 0 30px rgba(255,174,0,0.3);
}

/* Calor */
.calor{
    color:#ff3c00;
    text-shadow:
      0 0 5px rgba(255,60,0,0.9),
      0 0 15px rgba(255,60,0,0.6),
      0 0 35px rgba(255,60,0,0.4);
}

.valor{
    font-size:28px;
    font-weight:600;
}

.minmax{
    font-size:15px;
    opacity:0.8;
}

footer{
    padding:20px;
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<header>
🌤️ Meteo Cosuenda · Estación HP2550
</header>

<div class="container">

<div class="card">
<h2>Temperatura</h2>
<div id="tempBig" class="bigTemp">-- °C</div>
<div id="tempMin" class="minmax">Min diaria: --</div>
<div id="tempMax" class="minmax">Max diaria: --</div>
</div>

<div class="card">
<h2>Humedad</h2>
<div id="hum" class="valor">-- %</div>
</div>

<div class="card">
<h2>Viento</h2>
<div id="wind" class="valor">-- km/h</div>
<div id="windDirText" class="minmax">Dirección: --</div>
</div>

<div class="card">
<h2>Lluvia</h2>
<div id="rain" class="valor">-- mm</div>
</div>

<div class="card">
<h2>Presión</h2>
<div id="press" class="valor">-- hPa</div>
</div>

<div class="card">
<h2>Índice UV</h2>
<div id="uv" class="valor">--</div>
</div>

<div class="card">
<h2>Radiación Solar</h2>
<div id="solar" class="valor">-- W/m²</div>
</div>

</div>

<footer>
Actualización automática cada 5 minutos
</footer>

<script src="script.js"></script>

</body>
</html>
