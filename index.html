<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:linear-gradient(to bottom,#87CEEB,#f0f8ff);
    text-align:center;
}

header{
    background:linear-gradient(90deg,#004e92,#000428);
    color:white;
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    max-width:1000px;
    margin:30px auto;
    padding:10px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.card h2{
    margin:0;
    font-size:16px;
}

.card p{
    font-size:22px;
    font-weight:bold;
    margin-top:10px;
}

footer{
    margin-top:30px;
    padding:20px;
    font-size:14px;
}
</style>
</head>

<body>

<header>
<h1>🌤️ Meteo Cosuenda</h1>
<p>Datos en tiempo real</p>
</header>

<div class="cards">
<div class="card"><h2>🌡️ Temperatura</h2><p id="temp">-- °C</p></div>
<div class="card"><h2>💧 Humedad</h2><p id="hum">-- %</p></div>
<div class="card"><h2>💨 Viento</h2><p id="wind">-- km/h</p></div>
<div class="card"><h2>🌧️ Lluvia</h2><p id="rain">-- mm</p></div>
<div class="card"><h2>📈 Presión</h2><p id="press">-- hPa</p></div>
</div>

<footer>Actualización automática cada 5 minutos</footer>

<script>
const appKey = "26C4D6AD21CF8F8C4F3BA85E1CAF6701";
const apiKey = "adf65434-1ace-43dd-b9a9-27915843d243";
const mac = "84:CC:A8:B4:B1:F6";

const url = `https://api.ecowitt.net/api/v3/device/real_time?application_key=${appKey}&api_key=${apiKey}&mac=${mac}&call_back=all`;

// Conversiones seguras
function toC(f){ return ((f-32)*5/9).toFixed(1); }
function toKmh(mph){ return (mph*1.60934).toFixed(1); }
function toMm(inch){ return (inch*25.4).toFixed(1); }
function toHpa(inHg){ return (inHg*33.8639).toFixed(1); }

async function obtenerDatos(){
    try{
        const res = await fetch(url);
        const data = await res.json();

        if(data.code !== 0) return;

        const outdoor = data.data?.outdoor;
        const wind = data.data?.wind;
        const rain = data.data?.rainfall;
        const pressure = data.data?.pressure;

        if(outdoor?.temperature?.value)
            document.getElementById("temp").textContent =
                toC(outdoor.temperature.value) + " °C";

        if(outdoor?.humidity?.value)
            document.getElementById("hum").textContent =
                outdoor.humidity.value + " %";

        if(wind?.wind_speed?.value)
            document.getElementById("wind").textContent =
                toKmh(wind.wind_speed.value) + " km/h";

        if(rain?.daily?.value)
            document.getElementById("rain").textContent =
                toMm(rain.daily.value) + " mm";

        if(pressure?.relative?.value)
            document.getElementById("press").textContent =
                toHpa(pressure.relative.value) + " hPa";

    }catch(e){
        console.log("Error:",e);
    }
}

obtenerDatos();
setInterval(obtenerDatos,300000);
</script>

</body>
</html>
