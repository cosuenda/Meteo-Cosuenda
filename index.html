<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meteo Cosuenda</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Meteo Cosuenda</h1>
    <p>Estación meteorológica en tiempo real</p>
  </header>

  <main>
    <!-- Dashboard meteorológico -->
    <section class="weather">
      <h2>Datos actuales</h2>
      <div id="weather-dashboard">
        <div class="weather-item">
          <img id="weather-icon" src="icons/sun.png" alt="Icono del clima">
          <p id="temperature">-- °C</p>
        </div>
        <div class="weather-item">
          <p>Humedad</p>
          <p id="humidity">-- %</p>
        </div>
        <div class="weather-item">
          <p>Viento</p>
          <p id="wind">-- km/h</p>
        </div>
      </div>
    </section>

    <!-- Galería de imágenes -->
    <section class="gallery">
      <h2>Imágenes de Cosuenda</h2>
      <div class="images">
        <img src="images/cosuenda01.jpg" 
             alt="Vista panorámica del pueblo de Cosuenda"
             title="Cosuenda entre viñedos y su Torre de la Lisalta">
        <img src="images/cosuenda02.jpg" 
             alt="Calle empedrada del casco antiguo de Cosuenda"
             title="Calle típica del centro histórico de Cosuenda">
        <img src="images/cosuenda03.jpg" 
             alt="Campos y viñedos alrededor de Cosuenda"
             title="Paisaje rural y viñedos en los alrededores de Cosuenda">
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 Cosuenda</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
